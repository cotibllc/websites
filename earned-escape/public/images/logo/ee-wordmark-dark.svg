    <path d="M10 35 A12 12 0 0 1 30 35" stroke="#C9A84C" stroke-width="1.2" fill="none"/>
    <circle cx="20" cy="35" r="2.5" fill="#C9A84C"/>
    <line x1="20" y1="15" x2="20" y2="21" stroke="#C9A84C" stroke-width="0.8" opacity="0.7" stroke-linecap="round"/>
    <line x1="28" y1="18" x2="26" y2="21" stroke="#C9A84C" stroke-width="0.7" opacity="0.45" stroke-linecap="round"/>
    <line x1="12" y1="18" x2="14" y2="21" stroke="#C9A84C" stroke-width="0.7" opacity="0.45" stroke-linecap="round"/>
